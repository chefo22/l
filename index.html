<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audiolibros Pro - Dark Mode</title>
    <style>
        /* Estilos generales y fondo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }

        /* Contenedor principal */
        .player-container {
            background-color: #1a1a1a;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .book-info h2 { 
            margin: 10px 0 5px; 
            color: #ffffff; 
            font-weight: 600; 
            font-size: 1.4rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-info p { color: #a0a0a0; margin-bottom: 30px; }

        /* Sección de carga de archivo */
        .upload-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 2px dashed #4a90e2;
            border-radius: 12px;
            transition: border-color 0.3s;
        }
        
        #file-input { display: none; }

        .custom-file-upload {
            color: #4a90e2;
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
        }

        /* Barra de progreso personalizada */
        .progress-container { width: 100%; margin-bottom: 25px; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4a90e2;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.4);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
        }

        /* Controles de reproducción */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            background: none;
            border: 2px solid #1e5bb8;
            color: #4a90e2;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover { background-color: rgba(74, 144, 226, 0.1); }

        .play-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ajustes (Velocidad y Temporizador) */
        .beep-marker {
            position: absolute;
            width: 2px;
            height: 8px;
            background-color: #ffffff;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }

        select { 
            background-color: #333; 
            color: white; 
            border: none;
            border-radius: 8px; 
            padding: 8px; 
            outline: none;
            cursor: pointer;
        }        #timer-msg {
            color: #4a90e2;
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 15px;
        }

        #library-list {
            max-height: 350px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 10px;
            scrollbar-width: none;
        }

        .book-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .book-card:active { transform: scale(0.95); }

        .book-thumb {
            width: 130px;
            height: 130px;
            background: #333;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #444;
            background-size: cover;
            background-position: center;
        }

        .status-dot {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: #4a90e2;
            border-radius: 50%;
            border: 3px solid #1a1a1a;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .book-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .delete-btn-mini {
            position: absolute;
            bottom: 25px;
            right: 0;
            background: rgba(239, 71, 111, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
        }
    </style>
</head>
<body>


<div style="position: fixed; top: 20px; right: 20px; z-index: 1001;">
    <button onclick="toggleSettings()" style="padding: 10px 16px; border-radius: 12px; font-size: 1.1rem; border: 1px solid #333; background: #1a1a1a; color: #4a90e2; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">⚙️ Ajustes</button>
</div>

<div class="player-container">

    
    <div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
        <div class="player-container" style="background:#1a1a1a; border: 1px solid #333; position: relative;">
            <h3 style="color:#4a90e2; margin-top:0; margin-bottom: 20px;">Configuración</h3>
            
            <div class="upload-section" style="margin-bottom: 25px;">
                <label for="file-input" class="custom-file-upload" id="drop-zone">
                    <b id="file-label">📁 Añadir nuevo Audiolibro</b>
                </label>
                <input type="file" id="file-input" accept="audio/*">
            </div>

            <div style="background: #252525; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; align-items: center; justify-content: flex-start;">
                    <input type="checkbox" id="normalize-vol" onchange="toggleNormalization()" style="width: 20px; height: 20px; cursor: pointer; margin-right: 12px;">
                    <label for="normalize-vol" style="cursor: pointer; color: #4a90e2; font-weight: bold; font-size: 0.95rem;">🔊 Modo Noche (Audio Plano)</label>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: flex-start; border-top: 1px solid #333; padding-top: 15px; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="silence-beep" onchange="toggleSilenceDetection()" style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="silence-beep" style="cursor: pointer; color: #06d6a0; font-size: 0.9rem; font-weight: 500;">🔔 Bip en Silencio cada:</label>
                    </div>
                    <select id="beep-interval" style="width: 100%; padding: 8px; font-size: 0.85rem; background: #333; color: white; border: none; border-radius: 8px;">
                        <option value="300" selected>5 minutos</option>
                        <option value="600">10 minutos</option>
                        <option value="900">15 minutos</option>
                        <option value="1200">20 minutos</option>
                        <option value="1800">30 minutos</option>
                    </select>
                </div>
            </div>

            <button onclick="toggleSettings()" style="width:100%; background:#4a90e2; color:white; border:none; padding: 12px; font-size: 1rem;">Listo</button>
        </div>
    </div>

    
    <div id="library-container" style="background: #252525; border-radius: 15px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; text-align: left;">
        <h3 style="font-size: 0.9rem; margin: 0 0 12px 0; color: #4a90e2; display: flex; justify-content: space-between; align-items: center;">
            📚 Biblioteca Local
            <span id="db-status" style="font-size: 0.6rem; color: #666;">Conectando...</span>
        </h3>
        <div id="library-list">
            <small style="color:#666; text-align:center; display:block; padding: 10px;">Cargando archivos guardados...</small>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <div id="player-ui-container" style="display: none;">
        <div class="book-info">
            <div id="cover-container" style="margin-bottom: 20px; display: none;">
                <img id="cover-art" src="" alt="Portada" style="width: 200px; height: 200px; object-fit: cover; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #333;">
            </div>
            <h2 id="title">Sin archivo</h2>
            <p id="author">Reproductor Local</p>
        </div>

        <div class="progress-container" style="position: relative; height: 40px; display: flex; flex-direction: column; justify-content: center;">
            <div id="marker-layer" style="position: absolute; width: 100%; height: 6px; pointer-events: none;"></div>
            <input type="range" id="progress-bar" value="0" step="1" style="position: relative; z-index: 2;">
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls" style="justify-content: space-between; align-items: center; margin-top: 10px;">
            <button id="speed-display" onclick="cycleSpeed()" style="border:none; color: #888; font-size: 1rem; min-width: 45px; padding: 5px;">1x</button>
            <button onclick="skip(-15)" style="border:none; font-size: 1.6rem;">↺</button>
            <button id="play-pause" class="play-btn" onclick="togglePlay()">▶</button>
            <button onclick="skip(15)" style="border:none; font-size: 1.6rem;">↻</button>
            <button id="timer-icon" onclick="openTimerModal()" style="border:none; color: #888; font-size: 1.4rem; padding: 5px;">⏲</button>
        </div>
    </div>
    <div id="timer-msg" style="font-size: 0.75rem; color: #4a90e2; margin-top: 5px; height: 12px;"></div>

    
    <div id="timer-bottom-modal" style="display:none; position:fixed; bottom:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:flex-end;">
        <div style="width:100%; background:#1e1e1e; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; animation: slideUp 0.3s ease-out;">
            <div style="width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 20px;"></div>
            <h3 style="text-align:center; margin-bottom: 20px; font-size: 1.1rem;">Temporizador</h3>
            <div style="display:flex; flex-direction:column; gap: 5px;">
                <button onclick="setTimer(0)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">Desactivado</button>
                <button onclick="setTimer(5)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">5 minutos</button>
                <button onclick="setTimer(15)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">15 minutos</button>
                <button onclick="setTimer(30)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">30 minutos</button>
                <button onclick="setTimer(45)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">45 minutos</button>
                <button onclick="setTimer(60)" style="width:100%; text-align:left; border:none; padding:15px; color:white;">1 hora</button>
                <button onclick="closeTimerModal()" style="width:100%; text-align:center; border:none; padding:15px; color:#4a90e2; font-weight:bold; margin-top:10px;">Cerrar</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</div>

<script>
    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const speedSelect = document.getElementById('speed');
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');
    const titleEl = document.getElementById('title');
    const timerSelect = document.getElementById('sleep-timer');
    const timerMsg = document.getElementById('timer-msg');

    let sleepTimerTimeout;
    let currentFileName = "";
    let db;

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        if (modal.style.display === 'flex') {
            modal.style.display = 'none';
        } else {
            modal.style.display = 'flex';
        }
    }

    // Inicialización de Base de Datos (IndexedDB) para persistencia real
    const dbRequest = indexedDB.open("AudiobookProDB", 1);

    dbRequest.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("books")) {
            db.createObjectStore("books", { keyPath: "name" });
        }
    };

    dbRequest.onsuccess = (e) => {
        db = e.target.result;
        document.getElementById('db-status').textContent = "En línea ✓";
        displayLibrary();
    };

    dbRequest.onerror = () => {
        document.getElementById('db-status').textContent = "Error DB ✗";
    };

    function saveToLibrary(file) {
        if (!db) return;
        const transaction = db.transaction(["books"], "readwrite");
        const store = transaction.objectStore("books");
        
        const bookData = { 
            name: file.name, 
            data: file, 
            added: new Date().getTime()
        };

        const request = store.put(bookData);
        request.onsuccess = () => {
            timerMsg.textContent = "Guardado en biblioteca ✓";
            displayLibrary();
            setTimeout(() => timerMsg.textContent = "", 3000);
        };
    }    function displayLibrary() {
        const list = document.getElementById('library-list');
        if (!list) return;
        list.innerHTML = "";

        const transaction = db.transaction(["books"], "readonly");
        const store = transaction.objectStore("books");
        
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const bookData = cursor.value;
                const bookName = bookData.name;
                const escapedName = bookName.replace(/'/g, "\\'");
                
                const card = document.createElement('div');
                card.className = 'book-card';
                
                // Formatear nombre para que siempre se vea limpio
                const labelName = bookName.replace(/\.[^/.]+$/, "").substring(0, 20).toUpperCase();

                card.innerHTML = `
                    <div class="book-thumb" onclick="loadFromLibrary('${escapedName}')">
                        <div class="status-dot"></div>
                        <span style="font-size: 2.5rem; opacity: 0.15;">🎧</span>
                        <button class="delete-btn-mini" onclick="event.stopPropagation(); deleteFromLibrary('${escapedName}')">✕</button>
                    </div>
                    <div class="book-label">${labelName}</div>
                `;
                
                const currentThumb = card.querySelector('.book-thumb');
                list.appendChild(card);

                // Procesar tags usando la referencia directa al elemento actual (evita mezclas)
                try {
                    window.jsmediatags.read(bookData.data, {
                        onSuccess: function(tag) {
                            const { picture } = tag.tags;
                            if (picture && currentThumb) {
                                const { data, format } = picture;
                                let base64String = "";
                                for (let i = 0; i < data.length; i++) base64String += String.fromCharCode(data[i]);
                                currentThumb.style.backgroundImage = `url(data:${format};base64,${window.btoa(base64String)})`;
                                currentThumb.querySelector('span').style.display = 'none';
                            }
                        }
                    });
                } catch (err) {}

                cursor.continue();
            } else if (list.innerHTML === "") {
                list.innerHTML = "<small style='color:#666; text-align:center; grid-column: 1 / span 2; padding: 20px;'>Biblioteca vacía.</small>";
            }
        };
    }

    function deleteFromLibrary(name) {
        if (!confirm("¿Eliminar este libro de la memoria?")) return;
        const transaction = db.transaction(["books"], "readwrite");
        transaction.objectStore("books").delete(name);
        transaction.oncomplete = () => {
            if (currentFileName === name) location.reload();
            else displayLibrary();
        };
    }

    function loadFromLibrary(name) {
        const transaction = db.transaction(["books"], "readonly");
        const store = transaction.objectStore("books");
        store.get(name).onsuccess = (e) => {
            if (e.target.result) {
                processAudioFile(e.target.result.data);
                timerMsg.textContent = "Cargando de memoria...";
                setTimeout(() => timerMsg.textContent = "", 2000);
            }
        };
    }

    function processAudioFile(file) {
        document.getElementById('player-ui-container').style.display = 'block';
        currentFileName = file.name;
        fileLabel.textContent = "Libro: " + (currentFileName.length > 15 ? currentFileName.substring(0,12) + "..." : currentFileName);
        
        document.getElementById('cover-container').style.display = 'none';
        titleEl.textContent = currentFileName.replace(/\.[^/.]+$/, "");
        document.getElementById('author').textContent = "Leyendo etiquetas...";

        try {
            window.jsmediatags.read(file, {
                onSuccess: function(tag) {
                    const { title, artist, picture } = tag.tags;
                    if (title) titleEl.textContent = title;
                    if (artist) document.getElementById('author').textContent = artist;
                    else document.getElementById('author').textContent = "Autor Desconocido";
                    if (picture) {
                        const { data, format } = picture;
                        let base64String = "";
                        for (let i = 0; i < data.length; i++) base64String += String.fromCharCode(data[i]);
                        document.getElementById('cover-art').src = "data:" + format + ";base64," + window.btoa(base64String);
                        document.getElementById('cover-container').style.display = 'block';
                    }
                },
                onError: () => { document.getElementById('author').textContent = "Reproductor Local"; }
            });
        } catch (e) {}

        const objectURL = URL.createObjectURL(file);
        audio.src = objectURL;
        audio.load();
        playPauseBtn.textContent = '▶';

        const savedTime = localStorage.getItem('audiobook_progress_' + currentFileName);
        if(savedTime) audio.currentTime = parseFloat(savedTime);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            saveToLibrary(file);
            processAudioFile(file);
        }
    });

    audio.onloadedmetadata = () => {
        progressBar.max = Math.floor(audio.duration);
        durationEl.textContent = formatTime(audio.duration);
    };

    function togglePlay() {
        if (!audio.src) {
            alert("Por favor, selecciona primero un archivo de audio.");
            return;
        }
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '⏸';
        } else {
            audio.pause();
            playPauseBtn.textContent = '▶';
            // Guardar progreso al pausar manualmente
            saveProgress();
        }
    }

    // 2. Guardado automático de progreso mientras avanza
    audio.ontimeupdate = () => {
        progressBar.value = Math.floor(audio.currentTime);
        currentTimeEl.textContent = formatTime(audio.currentTime);
        
        // Guardamos el progreso cada vez que el tiempo se actualiza
        if(currentFileName && !audio.paused) {
            saveProgress();
        }
    };

    // Función para guardar en el navegador (localStorage)
    function saveProgress() {
        localStorage.setItem('audiobook_progress_' + currentFileName, audio.currentTime);
    }

    progressBar.oninput = () => {
        audio.currentTime = progressBar.value;
    };

    function skip(seconds) {
        audio.currentTime += seconds;
    }    const speeds = [1, 1.2, 1.5, 1.7, 2, 0.8];
    let currentSpeedIndex = 0;

    function cycleSpeed() {
        currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
        const newSpeed = speeds[currentSpeedIndex];
        audio.playbackRate = newSpeed;
        document.getElementById('speed-display').textContent = newSpeed + 'x';
        document.getElementById('speed-display').style.color = newSpeed === 1 ? '#888' : '#4a90e2';
    }

    function openTimerModal() { document.getElementById('timer-bottom-modal').style.display = 'flex'; }
    function closeTimerModal() { document.getElementById('timer-bottom-modal').style.display = 'none'; }

    function setTimer(minutes) {
        clearTimeout(sleepTimerTimeout);
        closeTimerModal();
        
        const timerIcon = document.getElementById('timer-icon');

        if (minutes > 0) {
            const milliseconds = minutes * 60 * 1000;
            timerMsg.textContent = `Pausa en ${minutes} min`;
            timerIcon.style.color = '#4a90e2';
            
            sleepTimerTimeout = setTimeout(() => {
                audio.pause();
                playPauseBtn.textContent = '▶';
                timerMsg.textContent = "Zzz...";
                timerIcon.style.color = '#888';
                saveProgress();
            }, milliseconds);
        } else {
            timerMsg.textContent = "";
            timerIcon.style.color = '#888';
        }
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }    audio.onerror = () => {
        if (audio.src) {
            alert("Error: No se pudo reproducir este archivo.");
        }
    };    // Lógica para Audio Plano (Compresión Dinámica) y Detector de Silencio
    let audioCtx, source, compressor, analyser, dataArray;
    let lastBeepTime = 0;
    let silenceInterval;

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            
            // Configuración Compresor
            compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-45, audioCtx.currentTime);
            compressor.knee.setValueAtTime(30, audioCtx.currentTime);
            compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
            compressor.release.setValueAtTime(0.25, audioCtx.currentTime);

            // Analizador para silencio
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            // Conexión inicial estándar
            source.connect(audioCtx.destination);
        }
    }

    function toggleNormalization() {
        if (!audio.src) { document.getElementById('normalize-vol').checked = false; alert("Carga un audio primero."); return; }
        initAudioContext();

        const isChecked = document.getElementById('normalize-vol').checked;
        source.disconnect();

        if (isChecked) {
            source.connect(compressor);
            compressor.connect(audioCtx.destination);
            timerMsg.textContent = "Modo Noche activado.";
        } else {
            source.connect(audioCtx.destination);
            timerMsg.textContent = "Audio normal.";
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        setTimeout(() => timerMsg.textContent = "", 3000);
    }

    function toggleSilenceDetection() {
        if (!audio.src) { document.getElementById('silence-beep').checked = false; alert("Carga un audio primero."); return; }
        initAudioContext();
        
        const isEnabled = document.getElementById('silence-beep').checked;
        if (isEnabled) {
            source.connect(analyser);
            silenceInterval = setInterval(checkSilence, 1000);
            timerMsg.textContent = "Detector de silencio activo.";
        } else {
            clearInterval(silenceInterval);
            timerMsg.textContent = "Detector desactivado.";
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        setTimeout(() => timerMsg.textContent = "", 3000);
    }

    function checkSilence() {
        if (audio.paused) return;

        analyser.getByteFrequencyData(dataArray);
        let average = dataArray.reduce((a, b) => a + b) / dataArray.length;
        
        const currentTime = audio.currentTime;
        const interval = parseInt(document.getElementById('beep-interval').value);

        // Si hay silencio (volumen bajo) y ha pasado el tiempo necesario
        if (average < 5 && (currentTime - lastBeepTime) >= interval) {
            playBeep();
            addMarker(currentTime);
            lastBeepTime = currentTime;
        }
    }

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime); // Nota La

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
    }

    function addMarker(time) {
        const markerLayer = document.getElementById('marker-layer');
        const percent = (time / audio.duration) * 100;
        const marker = document.createElement('div');
        marker.className = 'beep-marker';
        marker.style.left = `calc(${percent}% - 1px)`;
        markerLayer.appendChild(marker);
    }
</script>
