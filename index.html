<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard · 16:9 Independiente</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
        }

        /* ===== LAYOUT FLEXIBLE CON ALTURAS INDEPENDIENTES ===== */
        #dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            flex: 1;
            align-content: flex-start;
            align-items: flex-start;  /* ← CLAVE: cada tarjeta tiene su propia altura */
        }

        /* Tarjeta con 16:9 fijo e independiente */
        .card {
            position: relative;
            background: #16161e;
            border-radius: 16px;
            border: 1px solid #2a2a3a;
            overflow: visible;
            min-width: 180px;
            width: 300px;
            aspect-ratio: 16 / 9;      /* ← 16:9 siempre, independiente */
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: default;
            touch-action: none;
            flex-shrink: 0;
            flex-grow: 0;             /* no se estiran */
        }
        .card:hover {
            border-color: #4a4a6a;
            box-shadow: 0 0 0 1px #4a4a6a;
        }

        .card-inner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            background: #16161e;
            pointer-events: none;
        }
        .card-inner > * {
            pointer-events: auto;
        }

        /* Header arrastrable */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: #1a1a26;
            border-bottom: 1px solid #2a2a3a;
            gap: 6px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
            touch-action: none;
        }
        .card-header:active {
            cursor: grabbing;
        }
        .card-header .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fbbd14;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .card-header .controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .card-header .controls button {
            background: #2a2a3a;
            border: none;
            border-radius: 6px;
            padding: 2px 6px;
            color: #ccc;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 2px;
            transition: 0.15s;
        }
        .card-header .controls button:hover {
            background: #3a3a4e;
            color: #fff;
        }
        .card-header .controls button.close-btn {
            background: #3a1a1a;
            color: #f88;
        }
        .card-header .controls button.close-btn:hover {
            background: #5a2222;
        }

        .card-body {
            flex: 1;
            position: relative;
            background: #000;
            min-height: 0;
        }
        .card-body iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        .card-body .placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #555;
            background: #0a0a0a;
            pointer-events: none;
            gap: 8px;
        }
        .card-body .placeholder .material-symbols-outlined {
            font-size: 2.5rem;
            color: #333;
        }

        /* ===== HANDLE DE REDIMENSIONADO ===== */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            cursor: nw-resize;
            touch-action: none;
            z-index: 10;
            background: transparent;
            border-right: 4px solid #888;
            border-bottom: 4px solid #888;
            border-radius: 0 0 14px 0;
            opacity: 0.5;
            transition: opacity 0.2s, border-color 0.2s;
            pointer-events: auto;
        }
        .card:hover .resize-handle {
            opacity: 1;
            border-color: #fbbd14;
        }
        .resize-handle:active {
            border-color: #fbbd14;
            opacity: 1;
        }

        /* ===== BARRA DE MINIMIZADOS ===== */
        #minimizedBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f18;
            border-top: 1px solid #2a2a3a;
            padding: 8px 16px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 1000;
            align-items: center;
            min-height: 48px;
            backdrop-filter: blur(6px);
        }
        #minimizedBar .minimized-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 8px;
            background: #1a1a26;
            border-radius: 20px;
            border: 1px solid #2a2a3a;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        #minimizedBar .minimized-item:hover {
            background: #26263a;
        }
        #minimizedBar .minimized-item .label-text {
            color: #fbbd14;
            font-size: 0.8rem;
            font-weight: 500;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #minimizedBar .minimized-item .restore-icon {
            font-size: 1rem;
            color: #888;
            transition: color 0.15s;
            cursor: pointer;
        }
        #minimizedBar .minimized-item .restore-icon:hover {
            color: #fbbd14;
        }

        /* ===== BOTÓN FLOTANTE ===== */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 30px;
            background: #fbbd14;
            color: #000;
            border: none;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 1001;
        }
        .fab:hover {
            transform: scale(1.08);
            background: #f5a800;
        }
        .fab:active {
            transform: scale(0.92);
        }

        /* ===== ESTADO VACÍO ===== */
        .empty-state {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            gap: 16px;
            text-align: center;
        }
        .empty-state .material-symbols-outlined {
            font-size: 4rem;
            color: #333;
        }
        .empty-state button {
            background: #fbbd14;
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .empty-state button:hover {
            background: #f5a800;
            transform: scale(1.02);
        }

        /* ===== DRAG & DROP ===== */
        .card.dragging {
            opacity: 0.4;
            border-color: #fbbd14;
            transform: scale(0.98);
        }
        .card.drag-over {
            border-color: #fbbd14;
            background: #1a1a2e;
            box-shadow: 0 0 0 2px #fbbd14;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body { padding: 10px; padding-bottom: 70px; }
            .card {
                width: 100% !important;
                min-width: 0;
                flex-grow: 1;          /* en móvil se estiran para ocupar */
            }
            .resize-handle {
                display: none;
            }
            .fab {
                width: 56px;
                height: 56px;
                font-size: 1.8rem;
                bottom: 70px;
                right: 16px;
            }
            #minimizedBar {
                padding: 6px 10px;
                min-height: 44px;
            }
            #minimizedBar .minimized-item .label-text {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>

<div id="dashboard"></div>

<div class="empty-state" id="emptyState">
    <span class="material-symbols-outlined">live_tv</span>
    <p>No hay streams aún.</p>
    <button id="emptyAddBtn">+ Añadir stream</button>
</div>

<button class="fab" id="fabAddBtn" title="Añadir stream">
    <span class="material-symbols-outlined" style="font-size:2rem;">add</span>
</button>

<!-- Barra de minimizados -->
<div id="minimizedBar"></div>

<script>
    (function() {
        const dashboard = document.getElementById('dashboard');
        const emptyState = document.getElementById('emptyState');
        const fabAddBtn = document.getElementById('fabAddBtn');
        const emptyAddBtn = document.getElementById('emptyAddBtn');
        const minimizedBar = document.getElementById('minimizedBar');

        let cardCounter = 0;

        function updateEmptyState() {
            const cards = dashboard.querySelectorAll('.card:not([style*="display: none"])');
            if (cards.length === 0 && minimizedBar.children.length === 0) {
                emptyState.style.display = 'flex';
                dashboard.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                dashboard.style.display = 'flex';
            }
        }

        // ---- Minimizar / Restaurar ----
        function minimizeCard(card) {
            if (card.dataset.minimized === 'true') return;
            card.dataset.minimized = 'true';
            card.style.display = 'none';

            const labelEl = card.querySelector('.label');
            const labelText = labelEl ? labelEl.textContent.trim() : 'Stream';

            const miniItem = document.createElement('div');
            miniItem.className = 'minimized-item';
            miniItem.dataset.cardId = card.dataset.id;
            miniItem.innerHTML = `
                <span class="material-symbols-outlined" style="font-size:1rem; color:#fbbd14;">play_arrow</span>
                <span class="label-text">${labelText}</span>
                <span class="material-symbols-outlined restore-icon">expand_content</span>
            `;
            miniItem.addEventListener('click', (e) => {
                if (e.target.closest('.restore-icon')) return;
                restoreCard(card);
            });
            const restoreIcon = miniItem.querySelector('.restore-icon');
            restoreIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                restoreCard(card);
            });

            minimizedBar.appendChild(miniItem);
            minimizedBar.style.display = 'flex';
            card._miniItem = miniItem;

            updateEmptyState();
        }

        function restoreCard(card) {
            if (card.dataset.minimized !== 'true') return;
            card.dataset.minimized = 'false';
            card.style.display = '';

            const miniItem = card._miniItem;
            if (miniItem) {
                miniItem.remove();
                delete card._miniItem;
            }
            if (minimizedBar.children.length === 0) {
                minimizedBar.style.display = 'none';
            }
            updateEmptyState();
        }

        // ---- Crear tarjeta ----
        function createCard(url, label) {
            const card = document.createElement('div');
            card.className = 'card';
            card.draggable = false;
            card.dataset.id = ++cardCounter;
            card.dataset.minimized = 'false';
            card.style.width = '300px';

            const inner = document.createElement('div');
            inner.className = 'card-inner';

            // Header
            const header = document.createElement('div');
            header.className = 'card-header';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'label';
            labelSpan.innerHTML = `<span class="material-symbols-outlined" style="font-size:1rem;">play_circle</span> ${label || 'Stream'}`;

            const controls = document.createElement('div');
            controls.className = 'controls';

            const minBtn = document.createElement('button');
            minBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:0.9rem;">minimize</span>';
            minBtn.title = 'Minimizar (solo audio)';
            minBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (card.dataset.minimized === 'true') {
                    restoreCard(card);
                } else {
                    minimizeCard(card);
                }
            });

            const reloadBtn = document.createElement('button');
            reloadBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:0.9rem;">refresh</span>';
            reloadBtn.title = 'Recargar iframe';

            const openBtn = document.createElement('button');
            openBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:0.9rem;">open_in_new</span>';
            openBtn.title = 'Abrir en nueva pestaña';

            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-btn';
            closeBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:0.9rem;">close</span>';
            closeBtn.title = 'Eliminar stream';

            controls.appendChild(minBtn);
            controls.appendChild(reloadBtn);
            controls.appendChild(openBtn);
            controls.appendChild(closeBtn);

            header.appendChild(labelSpan);
            header.appendChild(controls);

            // Body
            const body = document.createElement('div');
            body.className = 'card-body';

            const iframe = document.createElement('iframe');
            iframe.allow = 'autoplay; fullscreen; encrypted-media';
            iframe.referrerPolicy = 'strict-origin-when-cross-origin';
            iframe.title = label || 'Stream';
            iframe.src = url ? url : 'about:blank';

            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.innerHTML = `
                <span class="material-symbols-outlined">play_circle</span>
                <span>Sin URL</span>
            `;
            if (url) {
                placeholder.style.display = 'none';
            } else {
                placeholder.style.display = 'flex';
            }

            body.appendChild(iframe);
            body.appendChild(placeholder);

            inner.appendChild(header);
            inner.appendChild(body);
            card.appendChild(inner);

            // ---- Handle de redimensionado ----
            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            card.appendChild(handle);

            let isResizing = false;
            let startX, startWidth;

            function startResize(e) {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                isResizing = true;
                startX = touch.clientX;
                startWidth = card.offsetWidth;
                document.addEventListener('pointermove', onResize);
                document.addEventListener('pointerup', stopResize);
                document.addEventListener('touchmove', onResizeTouch, { passive: false });
                document.addEventListener('touchend', stopResizeTouch);
                handle.style.borderColor = '#fbbd14';
            }

            function onResize(e) {
                if (!isResizing) return;
                const dx = e.clientX - startX;
                let newWidth = startWidth + dx;
                newWidth = Math.max(180, newWidth);
                card.style.width = newWidth + 'px';
            }

            function onResizeTouch(e) {
                e.preventDefault();
                if (!isResizing) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                let newWidth = startWidth + dx;
                newWidth = Math.max(180, newWidth);
                card.style.width = newWidth + 'px';
            }

            function stopResize() {
                isResizing = false;
                document.removeEventListener('pointermove', onResize);
                document.removeEventListener('pointerup', stopResize);
                handle.style.borderColor = '';
            }

            function stopResizeTouch() {
                isResizing = false;
                document.removeEventListener('touchmove', onResizeTouch);
                document.removeEventListener('touchend', stopResizeTouch);
                handle.style.borderColor = '';
            }

            handle.addEventListener('pointerdown', startResize);
            handle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startResize(e);
            }, { passive: false });

            // ---- Eventos de botones ----
            reloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const currentSrc = iframe.src;
                if (currentSrc && currentSrc !== 'about:blank') {
                    iframe.src = 'about:blank';
                    setTimeout(() => { iframe.src = currentSrc; }, 50);
                } else {
                    const newUrl = prompt('Introduce la URL del stream:', '');
                    if (newUrl && newUrl.trim() !== '') {
                        let final = newUrl.trim();
                        if (!/^https?:\/\//i.test(final)) final = 'https://' + final;
                        iframe.src = final;
                        placeholder.style.display = 'none';
                        const lbl = card.querySelector('.label');
                        if (lbl) {
                            const text = lbl.textContent.replace(/^[^\s]+\s*/, '').trim();
                            lbl.innerHTML = `<span class="material-symbols-outlined" style="font-size:1rem;">play_circle</span> ${text || 'Stream'}`;
                        }
                    }
                }
            });

            openBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const src = iframe.src;
                if (src && src !== 'about:blank') {
                    window.open(src, '_blank');
                } else {
                    alert('No hay URL cargada.');
                }
            });

            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (card.dataset.minimized === 'true') {
                    const miniItem = card._miniItem;
                    if (miniItem) {
                        miniItem.remove();
                        delete card._miniItem;
                    }
                    if (minimizedBar.children.length === 0) {
                        minimizedBar.style.display = 'none';
                    }
                }
                card.remove();
                updateEmptyState();
            });

            iframe.addEventListener('dblclick', () => {
                const current = iframe.src;
                const newUrl = prompt('Editar URL del stream:', current === 'about:blank' ? '' : current);
                if (newUrl !== null && newUrl.trim() !== '') {
                    let final = newUrl.trim();
                    if (!/^https?:\/\//i.test(final)) final = 'https://' + final;
                    iframe.src = final;
                    placeholder.style.display = 'none';
                } else if (newUrl === '') {
                    iframe.src = 'about:blank';
                    placeholder.style.display = 'flex';
                }
            });

            // ---- Arrastre para reordenar ----
            let isDragging = false;
            let ghostCard = null;
            let dragOffsetX = 0, dragOffsetY = 0;

            function startDrag(e) {
                if (e.target.closest('.controls')) return;
                const touch = e.touches ? e.touches[0] : e;
                isDragging = true;
                const rect = card.getBoundingClientRect();
                dragOffsetX = touch.clientX - rect.left;
                dragOffsetY = touch.clientY - rect.top;

                ghostCard = card.cloneNode(true);
                ghostCard.style.position = 'fixed';
                ghostCard.style.width = card.offsetWidth + 'px';
                ghostCard.style.pointerEvents = 'none';
                ghostCard.style.opacity = '0.7';
                ghostCard.style.zIndex = '9999';
                ghostCard.style.transform = 'scale(0.98)';
                ghostCard.style.borderColor = '#fbbd14';
                document.body.appendChild(ghostCard);
                card.classList.add('dragging');

                document.addEventListener('pointermove', onDrag);
                document.addEventListener('pointerup', endDrag);
                document.addEventListener('touchmove', onDragTouch, { passive: false });
                document.addEventListener('touchend', endDragTouch);
            }

            function onDrag(e) {
                if (!isDragging) return;
                ghostCard.style.left = (e.clientX - dragOffsetX) + 'px';
                ghostCard.style.top = (e.clientY - dragOffsetY) + 'px';

                const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
                const cardBelow = elemBelow ? elemBelow.closest('.card') : null;
                document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
                if (cardBelow && cardBelow !== card && cardBelow.dataset.minimized !== 'true') {
                    cardBelow.classList.add('drag-over');
                }
            }

            function onDragTouch(e) {
                e.preventDefault();
                if (!isDragging) return;
                const touch = e.touches[0];
                ghostCard.style.left = (touch.clientX - dragOffsetX) + 'px';
                ghostCard.style.top = (touch.clientY - dragOffsetY) + 'px';

                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                const cardBelow = elemBelow ? elemBelow.closest('.card') : null;
                document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
                if (cardBelow && cardBelow !== card && cardBelow.dataset.minimized !== 'true') {
                    cardBelow.classList.add('drag-over');
                }
            }

            function endDrag(e) {
                if (!isDragging) return;
                isDragging = false;
                card.classList.remove('dragging');
                if (ghostCard) {
                    ghostCard.remove();
                    ghostCard = null;
                }

                const touch = e.changedTouches ? e.changedTouches[0] : e;
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                const cardBelow = elemBelow ? elemBelow.closest('.card') : null;
                document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));

                if (cardBelow && cardBelow !== card && cardBelow.dataset.minimized !== 'true') {
                    const rect = cardBelow.getBoundingClientRect();
                    const midY = rect.top + rect.height / 2;
                    if (touch.clientY < midY) {
                        dashboard.insertBefore(card, cardBelow);
                    } else {
                        dashboard.insertBefore(card, cardBelow.nextSibling);
                    }
                }

                document.removeEventListener('pointermove', onDrag);
                document.removeEventListener('pointerup', endDrag);
                document.removeEventListener('touchmove', onDragTouch);
                document.removeEventListener('touchend', endDragTouch);
            }

            function endDragTouch(e) {
                if (!isDragging) return;
                isDragging = false;
                card.classList.remove('dragging');
                if (ghostCard) {
                    ghostCard.remove();
                    ghostCard = null;
                }
                const touch = e.changedTouches[0];
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                const cardBelow = elemBelow ? elemBelow.closest('.card') : null;
                document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));

                if (cardBelow && cardBelow !== card && cardBelow.dataset.minimized !== 'true') {
                    const rect = cardBelow.getBoundingClientRect();
                    const midY = rect.top + rect.height / 2;
                    if (touch.clientY < midY) {
                        dashboard.insertBefore(card, cardBelow);
                    } else {
                        dashboard.insertBefore(card, cardBelow.nextSibling);
                    }
                }
                document.removeEventListener('pointermove', onDrag);
                document.removeEventListener('pointerup', endDrag);
                document.removeEventListener('touchmove', onDragTouch);
                document.removeEventListener('touchend', endDragTouch);
            }

            header.addEventListener('pointerdown', startDrag);
            header.addEventListener('touchstart', (e) => {
                if (e.target.closest('.controls')) return;
                e.preventDefault();
                startDrag(e);
            }, { passive: false });

            return card;
        }

        // ---- Añadir stream ----
        function addStreamFromPrompt() {
            const url = prompt('Introduce la URL del stream:');
            if (url !== null && url.trim() !== '') {
                let finalUrl = url.trim();
                if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
                const label = prompt('Etiqueta (opcional):') || 'Stream';
                const card = createCard(finalUrl, label);
                dashboard.appendChild(card);
                updateEmptyState();
            }
        }

        // ---- Eventos ----
        fabAddBtn.addEventListener('click', addStreamFromPrompt);
        emptyAddBtn.addEventListener('click', addStreamFromPrompt);

        // ---- Inicialización ----
        updateEmptyState();

        // ---- Precarga desde URL ----
        const params = new URLSearchParams(window.location.search);
        const preUrl = params.get('url');
        if (preUrl) {
            setTimeout(() => {
                const card = createCard(preUrl, 'Precargado');
                dashboard.appendChild(card);
                updateEmptyState();
            }, 300);
        }
