<!DOCTYPE html>

    <meta charset="UTF-8" />

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    <style>
        /* Estilos (idénticos a la versión anterior) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', Roboto, sans-serif; padding: 16px; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }

        .selector-panel { background: #1a1a1a; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }

        .selector-panel select, .selector-panel input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; min-width: 140px; }
        .selector-panel button { background: #ff3333; border: none; color: #fff; padding: 8px 24px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
        .selector-panel button:hover { background: #cc0000; }

        .error-message { background: #3d1a1a; color: #ff6b6b; padding: 16px 20px; border-radius: 8px; border-left: 4px solid #ff3333; margin: 20px 0; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-message { background: #1a2a3a; color: #88ccff; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #4caf50; margin: 12px 0; }

        .map-controls { display: flex; gap: 12px; margin: 8px 0 4px 0; align-items: center; flex-wrap: wrap; }
        .map-controls button { background: #2a2a2a; border: none; color: #ccc; padding: 4px 16px; border-radius: 16px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .map-controls button:hover { background: #444; color: #fff; }
        .map-controls button.active { background: #ff3333; color: #fff; }
        .map-legend { display: flex; flex-wrap: wrap; gap: 6px 16px; padding: 4px 0; font-size: 0.7rem; color: #aaa; }

        .map-legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .session-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }

        .session-item:hover { background: #444; }
        .session-item.active { background: #ff3333; border-color: #ff3333; }
        .rate-limit-bar { background: #1a1a1a; padding: 10px 16px; border-radius: 8px; margin: 12px 0; display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }
        .rate-limit-bar .status { color: #aaa; font-size: 0.85rem; }
        .rate-limit-bar .count { color: #88ccff; font-weight: bold; }
        .rate-limit-bar .switch { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #aaa; }
        .rate-limit-bar .switch input[type="checkbox"] { width: 40px; height: 20px; appearance: none; background: #555; border-radius: 10px; position: relative; cursor: pointer; transition: 0.3s; }
        .rate-limit-bar .switch input[type="checkbox"]:checked { background: #ff3333; }
        .rate-limit-bar .switch input[type="checkbox"]::before { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .rate-limit-bar .switch input[type="checkbox"]:checked::before { left: 22px; }
        .preload-indicator { color: #ffaa00; font-size: 0.8rem; margin-left: 8px; }
        @media (max-width: 640px) {
            .app-header { flex-direction: column; align-items: stretch; gap: 10px; }
            .header-controls { justify-content: space-between; }
            .playback-controls { flex-wrap: wrap; justify-content: center; }
            table { font-size: 0.75rem; min-width: 600px; }
            thead th, tbody td { padding: 6px 8px; }
            .driver-acronym { font-size: 0.85rem; }
            .tyre { font-size: 0.65rem; padding: 0 8px 0 4px; }
            .tyre-circle { width: 10px; height: 10px; }
            .selector-panel { flex-direction: column; align-items: stretch; }
            .selector-panel label { width: 100%; }
            .selector-panel select, .selector-panel input { width: 100%; }
            .rate-limit-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ================================================================
        // 1. RATE LIMITER (3/s, 30/min)
        // ================================================================
        class RateLimiter {
            constructor(options = {}) {
                this.maxPerSecond = options.maxPerSecond || 3;
                this.maxPerMinute = options.maxPerMinute || 30;
                this.history = [];
                this.listeners = [];
            }

            async waitForSlot() {
                const now = Date.now();
                this.history = this.history.filter(t => now - t < 60000);

                const lastSecond = this.history.filter(t => now - t < 1000).length;
                const lastMinute = this.history.length;

                let waitTime = 0;
                if (lastSecond >= this.maxPerSecond) {
                    const oldestInSecond = this.history.filter(t => now - t < 1000)
                        .sort((a, b) => a - b)[0];
                    waitTime = Math.max(waitTime, 1000 - (now - oldestInSecond));
                }
                if (lastMinute >= this.maxPerMinute) {
                    const oldestInMinute = this.history.sort((a, b) => a - b)[0];
                    waitTime = Math.max(waitTime, 60000 - (now - oldestInMinute));
                }

                if (waitTime > 0) {
                    this.notifyWait(waitTime);
                    await new Promise(resolve => setTimeout(resolve, waitTime + 10));
                }

                this.history.push(Date.now());
                this.notifyReady();
                return true;
            }

            notifyWait(waitTime) {
                this.listeners.forEach(fn => fn({ type: 'wait', waitTime }));
            }

            notifyReady() {
                this.listeners.forEach(fn => fn({ type: 'ready' }));
            }

            subscribe(listener) {
                this.listeners.push(listener);
                return () => {
                    this.listeners = this.listeners.filter(l => l !== listener);
                };
            }

            getRequestsInLastMinute() {
                const now = Date.now();
                this.history = this.history.filter(t => now - t < 60000);
                return this.history.length;
            }
        }

        // ================================================================
        // 2. API HELPERS
        // ================================================================
        const API_BASE = 'https://api.openf1.org/v1';

        async function fetchAPI(endpoint, params = {}) {
            const clean = {};
            Object.entries(params).forEach(([k, v]) => {
                if (v !== undefined && v !== null && v !== '') clean[k] = v;
            });
            const url = new URL(`${API_BASE}${endpoint}`);
            Object.entries(clean).forEach(([k, v]) => url.searchParams.append(k, v));
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
            return res.json();
        }

        // ================================================================
        // 3. INDEXED DB (sin fallback, para servidor)
        // ================================================================
        const DB_NAME = 'F1TimingDB';
        const STORE_NAME = 'sessionData';
        const DRIVERS_STORE = 'yearDrivers';

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 2);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'sessionKey' });
                    }
                    if (!db.objectStoreNames.contains(DRIVERS_STORE)) {
                        db.createObjectStore(DRIVERS_STORE, { keyPath: 'year' });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        // Guardar datos de sesión
        async function saveSessionData(sessionKey, data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ sessionKey, ...data, timestamp: Date.now() });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function loadSessionData(sessionKey) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(sessionKey);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => reject(req.error);
            });
        }

        // Guardar pilotos por año
        async function saveYearDrivers(year, drivers) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(DRIVERS_STORE, 'readwrite');
                const store = tx.objectStore(DRIVERS_STORE);
                store.put({ year, drivers, timestamp: Date.now() });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function loadYearDrivers(year) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(DRIVERS_STORE, 'readonly');
                const store = tx.objectStore(DRIVERS_STORE);
                const req = store.get(year);
                req.onsuccess = () => {
                    const result = req.result;
                    if (result && result.drivers) {
                        resolve(result.drivers);
                    } else {
                        resolve(null);
                    }
                };
                req.onerror = () => reject(req.error);
            });
        }

        // ================================================================
        // 4. PROCESAR DATOS (COMPACTAR)
        // ================================================================
        function buildCompactData({ drivers, positions, intervals, locations = [] }) {
            const driverMap = {};
            drivers.forEach(d => {
                driverMap[d.driver_number] = {
                    a: d.name_acronym || d.full_name?.substring(0, 3).toUpperCase() || '??',
                    c: d.team_colour ? `#${d.team_colour}` : '#888',
                };
            });

            // Trazado del circuito (desde locations)
            let trackPoints = [];
            if (locations && locations.length > 0) {
                const grouped = {};
                locations.forEach(l => {
                    if (!grouped[l.driver_number]) grouped[l.driver_number] = [];
                    grouped[l.driver_number].push(l);
                });
                let bestDriver = null, maxPoints = 0;
                Object.entries(grouped).forEach(([num, pts]) => {
                    if (pts.length > maxPoints) { maxPoints = pts.length; bestDriver = num; }
                });
                if (bestDriver) {
                    const pts = grouped[bestDriver].sort((a, b) => new Date(a.date) - new Date(b.date));
                    const step = Math.max(1, Math.floor(pts.length / 500));
                    trackPoints = pts.filter((_, i) => i % step === 0).map(p => ({ x: p.x, y: p.y }));
                }
            }

            // Snapshots
            const dates = [...new Set([
                ...positions.map(p => p.date),
                ...intervals.map(i => i.date)
            ])].sort();

            let snapshots = [];
            if (dates.length === 0) {
                const driversSnap = {};
                positions.forEach(p => { driversSnap[p.driver_number] = { p: p.position }; });
                intervals.forEach(i => {
                    if (!driversSnap[i.driver_number]) driversSnap[i.driver_number] = {};
                    driversSnap[i.driver_number].g = i.gap_to_leader;
                    driversSnap[i.driver_number].i = i.interval;
                });
                const list = Object.entries(driversSnap).map(([num, data]) => ({
                    n: parseInt(num), p: data.p || 20, g: data.g ?? null, i: data.i ?? null
                }));
                list.sort((a, b) => a.p - b.p);
                snapshots.push({ lap: 0, d: list });
            } else {
                dates.forEach((date, idx) => {
                    const posAtDate = positions.filter(p => p.date <= date);
                    const intAtDate = intervals.filter(i => i.date <= date);
                    const posMap = {};
                    posAtDate.forEach(p => posMap[p.driver_number] = p.position);
                    const intMap = {};
                    intAtDate.forEach(i => intMap[i.driver_number] = { g: i.gap_to_leader, i: i.interval });

                    const driverNumbers = new Set([...Object.keys(posMap), ...Object.keys(driverMap)]);
                    const list = [];
                    driverNumbers.forEach(num => {
                        const pos = posMap[num] || 20;
                        const intData = intMap[num] || { g: null, i: null };
                        list.push({ n: parseInt(num), p: pos, g: intData.g, i: intData.i });
                    });
                    list.sort((a, b) => a.p - b.p);
                    snapshots.push({ lap: idx + 1, d: list });
                });
            }

            // Limitar a 200 snapshots
            if (snapshots.length > 200) {
                const step = Math.ceil(snapshots.length / 200);
                snapshots = snapshots.filter((_, i) => i % step === 0);
            }

            return { drivers: driverMap, snapshots, trackPoints };
        }

        // ================================================================
        // 5. FUNCIÓN OBTENER DATOS (CON CACHÉ Y PRECARGA)
        // ================================================================
        async function getSessionData(sessionKey, year, rateLimiter, useRateLimiter, yearDriversCache) {
            // Intentar cargar desde IndexedDB
            let stored = await loadSessionData(sessionKey);
            if (stored && stored.snapshots) {
                return stored;
            }

            // Obtener pilotos: primero desde caché de año
            let drivers = null;
            if (year && yearDriversCache[year]) {
                drivers = yearDriversCache[year];
            } else {
                // Si no, descargar de la API
                if (useRateLimiter) await rateLimiter.waitForSlot();
                drivers = await fetchAPI('/drivers', { session_key: sessionKey });
                // Guardar en caché de año
                if (year) {
                    yearDriversCache[year] = drivers;
                    await saveYearDrivers(year, drivers);
                }
            }

            // Descargar el resto
            const endpoints = [
                { name: 'position', endpoint: '/position', params: { session_key: sessionKey } },
                { name: 'intervals', endpoint: '/intervals', params: { session_key: sessionKey } },
                { name: 'location', endpoint: '/location', params: { session_key: sessionKey } },
            ];
            const results = {};
            for (const ep of endpoints) {
                if (useRateLimiter) await rateLimiter.waitForSlot();
                results[ep.name] = await fetchAPI(ep.endpoint, ep.params);
            }
            const { position, intervals, location } = results;
            const compact = buildCompactData({
                drivers,
                positions: position || [],
                intervals: intervals || [],
                locations: location || [],
            });
            if (!compact.snapshots || compact.snapshots.length === 0) {
                throw new Error('No se pudieron generar snapshots');
            }
            await saveSessionData(sessionKey, compact);
            return compact;
        }

        // ================================================================
        // 6. COMPONENTE PRINCIPAL
        // ================================================================
        function App() {
            // ---- Estado ----
            const [sessions, setSessions] = useState([]);
            const [selectedSession, setSelectedSession] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [info, setInfo] = useState('');
            const [compactData, setCompactData] = useState(null);
            const [snapshotIndex, setSnapshotIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(1);
            const [mode, setMode] = useState('offline');
            const [showMap, setShowMap] = useState(true);
            const [carPositions, setCarPositions] = useState({});
            const [yearDriversCache, setYearDriversCache] = useState({});
            const [selectedYear, setSelectedYear] = useState('2024');
            const [preloading, setPreloading] = useState(false);
            const [preloadDone, setPreloadDone] = useState(false);

            // Rate limiter
            const [rateLimiter] = useState(() => new RateLimiter());
            const [useRateLimiter, setUseRateLimiter] = useState(true);
            const [rateStatus, setRateStatus] = useState('⏱️ Listo');
            const [rateCount, setRateCount] = useState(0);
            const [rateWaiting, setRateWaiting] = useState(false);

            // Referencias
            const timerRef = useRef(null);
            const unsubscribeRef = useRef(null);
            const preloadRef = useRef(false);

            // ---- Suscripción al rate limiter ----
            useEffect(() => {
                const unsub = rateLimiter.subscribe((event) => {
                    if (event.type === 'wait') {
                        const sec = (event.waitTime / 1000).toFixed(1);
                        setRateStatus(`⏳ Esperando ${sec}s...`);
                        setRateWaiting(true);
                    } else if (event.type === 'ready') {
                        setRateStatus('✅ Listo');
                        setRateWaiting(false);
                    }
                });
                const interval = setInterval(() => {
                    setRateCount(rateLimiter.getRequestsInLastMinute());
                }, 1000);
                return () => {
                    unsub();
                    clearInterval(interval);
                };
            }, [rateLimiter]);

            // ---- PRECARGA DE PILOTOS POR AÑO ----
            useEffect(() => {
                const preloadYearDrivers = async (year) => {
                    if (!year) return;
                    if (yearDriversCache[year]) return;
                    try {
                        const stored = await loadYearDrivers(year);
                        if (stored) {
                            setYearDriversCache(prev => ({ ...prev, [year]: stored }));
                            return;
                        }
                    } catch (e) { /* ignorar */ }
                    // Descargar
                    try {
                        const sessionsYear = await fetchAPI('/sessions', { year, session_type: 'Race' });
                        if (!sessionsYear || sessionsYear.length === 0) return;
                        const sessionKey = sessionsYear[0].session_key;
                        if (useRateLimiter) await rateLimiter.waitForSlot();
                        const drivers = await fetchAPI('/drivers', { session_key: sessionKey });
                        if (drivers && drivers.length > 0) {
                            setYearDriversCache(prev => ({ ...prev, [year]: drivers }));
                            await saveYearDrivers(year, drivers);
                        }
                    } catch (e) {
                        console.warn('Error precargando pilotos:', e);
                    }
                };
                preloadYearDrivers(selectedYear);
            }, [selectedYear, useRateLimiter, rateLimiter]);

            // ---- PRECARGA DE LA PRIMERA SESIÓN AL LISTAR ----
            useEffect(() => {
                if (sessions.length === 0 || preloadRef.current) return;
                preloadRef.current = true;
                setPreloading(true);
                const firstSession = sessions[0]; // la más reciente
                (async () => {
                    try {
                        const year = firstSession.year;
                        const sessionKey = firstSession.session_key;
                        // Verificar si ya está en caché
                        const stored = await loadSessionData(sessionKey);
                        if (stored && stored.snapshots) {
                            setPreloadDone(true);
                            setPreloading(false);
                            setInfo(`📦 Datos de ${firstSession.country_name} ya en caché`);
                            return;
                        }
                        // Descargar en segundo plano
                        const compact = await getSessionData(
                            sessionKey,
                            year,
                            rateLimiter,
                            useRateLimiter,
                            yearDriversCache
                        );
                        setPreloadDone(true);
                        setInfo(`✅ Precargada: ${firstSession.country_name} (${compact.snapshots.length} snapshots)`);
                    } catch (e) {
                        console.warn('Error en precarga:', e);
                        setInfo(`⚠️ No se pudo precargar: ${e.message}`);
                    } finally {
                        setPreloading(false);
                    }
                })();
            }, [sessions, rateLimiter, useRateLimiter, yearDriversCache]);

            // ---- Cargar sesiones ----
            const loadSessions = useCallback(async (year, country, type) => {
                setLoading(true);
                setError('');
                setPreloadDone(false);
                preloadRef.current = false;
                try {
                    const params = {};
                    if (year) params.year = year;
                    if (country) params.country_name = country;
                    if (type) params.session_type = type;
                    if (useRateLimiter) await rateLimiter.waitForSlot();
                    const data = await fetchAPI('/sessions', params);
                    data.sort((a, b) => new Date(b.date_start) - new Date(a.date_start));
                    setSessions(data);
                    setInfo(`✅ ${data.length} sesiones encontradas`);
                } catch (e) {
                    setError(`❌ Error: ${e.message}`);
                }
                setLoading(false);
            }, [rateLimiter, useRateLimiter]);

            // ---- Descargar y mostrar una sesión ----
            const downloadSession = useCallback(async (session) => {
                setSelectedSession(session);
                setLoading(true);
                setError('');
                setInfo('');
                try {
                    const sessionKey = session.session_key;
                    const year = session.year;
                    const compact = await getSessionData(
                        sessionKey,
                        year,
                        rateLimiter,
                        useRateLimiter,
                        yearDriversCache
                    );
                    setCompactData(compact);
                    setSnapshotIndex(0);
                    setInfo(`✅ Datos cargados (${compact.snapshots.length} snapshots, ${Object.keys(compact.drivers).length} pilotos)`);

                    // Posiciones para el mapa
                    const locs = await loadSessionData(sessionKey); // ya tiene location si estaba en caché
                    // Si no, podemos obtener location de la caché o descargar de nuevo
                    // Como ya tenemos location en el compact, pero no las posiciones actuales,
                    // podemos intentar cargar location desde la API si no las tenemos.
                    // Por simplicidad, usamos las que tenemos en el compact (trackPoints no da posiciones de coches)
                    // En la versión anterior, cargábamos carPositions desde location. Aquí no lo hacemos.
                    // Pero podemos volver a pedir location si queremos las posiciones actuales.
                    // Lo dejamos como estaba: si hay location, se guarda en compact, pero no tenemos carPositions.
                    // Para mantener funcionalidad, cargamos carPositions desde location si existe.
                    try {
                        if (useRateLimiter) await rateLimiter.waitForSlot();
                        const locationData = await fetchAPI('/location', { session_key: sessionKey });
                        if (locationData && locationData.length > 0) {
                            const latest = {};
                            locationData.forEach(l => {
                                if (!latest[l.driver_number] || new Date(l.date) > new Date(latest[l.driver_number].date)) {
                                    latest[l.driver_number] = l;
                                }
                            });
                            const posMap = {};
                            Object.entries(latest).forEach(([num, pos]) => {
                                posMap[num] = { x: pos.x, y: pos.y };
                            });
                            setCarPositions(posMap);
                        }
                    } catch (e) {
                        console.warn('No se pudieron obtener ubicaciones para el mapa:', e);
                    }
                } catch (e) {
                    setError(`❌ Error: ${e.message}`);
                }
                setLoading(false);
            }, [rateLimiter, useRateLimiter, yearDriversCache]);

            // ---- Control de reproducción ----
            useEffect(() => {
                if (!compactData || !isPlaying) return;
                if (timerRef.current) clearInterval(timerRef.current);
                const interval = 4000 / speed;
                timerRef.current = setInterval(() => {
                    setSnapshotIndex(prev => {
                        if (prev < compactData.snapshots.length - 1) return prev + 1;
                        setIsPlaying(false);
                        return prev;
                    });
                }, interval);
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [isPlaying, speed, compactData]);

            const playPause = () => setIsPlaying(!isPlaying);
            const stop = () => { setIsPlaying(false); setSnapshotIndex(0); };
            const prevSnapshot = () => setSnapshotIndex(prev => Math.max(0, prev - 1));
            const nextSnapshot = () => setSnapshotIndex(prev => Math.min(compactData?.snapshots?.length - 1 || 0, prev + 1));

            // ---- Render ----
            const currentSnapshot = compactData?.snapshots?.[snapshotIndex] || null;
            const drivers = currentSnapshot?.d || [];
            const totalSnapshots = compactData?.snapshots?.length || 0;

            return (
                <div>
                    <header className="app-header">
                        <h1>🏁 <span>F1</span> Timing</h1>
                        <div className="header-controls">
                            <div className="mode-selector">
                                <button className={`mode-btn ${mode === 'offline' ? 'active' : ''}`} onClick={() => setMode('offline')}>📼 Offline</button>
                                <button className={`mode-btn ${mode === 'online' ? 'active' : ''}`} onClick={() => setMode('online')}>📡 Online</button>
                            </div>
                            <div className="status-badge">
                                <span className={`dot ${mode === 'offline' ? 'green' : 'orange'}`}></span>
                                {mode === 'offline' ? (isPlaying ? 'Reproduciendo' : 'Pausado') : 'En directo (WS)'}
                            </div>
                        </div>
                    </header>

                    <div className="rate-limit-bar">
                        <span className="status">{rateStatus}</span>
                        <span className="count">{rateCount} peticiones/min</span>
                        <div className="switch">
                            <label>
                                <input type="checkbox" checked={useRateLimiter} onChange={(e) => setUseRateLimiter(e.target.checked)} />
                                Modo Free
                            </label>
                        </div>
                        {rateWaiting && <span style={{ color: '#ffaa00', fontSize: '0.8rem' }}>⏳ Esperando...</span>}
                        {preloading && <span className="preload-indicator">⏳ Precargando sesión...</span>}
                        {preloadDone && !preloading && <span className="preload-indicator" style={{ color: '#4caf50' }}>✅ Precargado</span>}
                    </div>

                    <div className="selector-panel">
                        <label>Año
                            <select id="yearSelect" value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)}>
                                <option value="">Todos</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2025">2025</option>
                            </select>
                        </label>
                        <label>País
                            <input type="text" id="countryInput" placeholder="Ej: Spain" style={{ background: '#2a2a2a', border: '1px solid #444', color: '#fff', padding: '8px 12px', borderRadius: '6px', width: '140px' }} />
                        </label>
                        <label>Tipo
                            <select id="typeSelect">
                                <option value="">Todos</option>
                                <option value="Race">Race</option>
                                <option value="Qualifying">Qualifying</option>
                                <option value="Practice">Practice</option>
                            </select>
                        </label>
                        <button onClick={() => {
                            const year = document.getElementById('yearSelect').value;
                            const country = document.getElementById('countryInput').value.trim();
                            const type = document.getElementById('typeSelect').value;
                            loadSessions(year, country, type);
                        }} disabled={loading || rateWaiting}>
                            {loading ? 'Cargando...' : 'Buscar sesiones'}
                        </button>
                    </div>

                    {sessions.length > 0 && (
                        <div className="session-list">
                            {sessions.slice(0, 30).map(s => (
                                <span key={s.session_key} className={`session-item ${selectedSession?.session_key === s.session_key ? 'active' : ''}`}
                                    onClick={() => downloadSession(s)}>
                                    {s.country_name} {s.session_name} ({s.year})
                                </span>
                            ))}
                            {sessions.length > 30 && <span style={{ color: '#888', fontSize: '0.8rem', padding: '6px' }}>+{sessions.length - 30} más</span>}
                        </div>
                    )}

                    {error && <div className="error-message">{error}</div>}
                    {info && <div className="info-message">{info}</div>}
                    {loading && <div className="loading-message"><span>🏎️</span> Descargando...</div>}

                    {compactData && currentSnapshot && (
                        <>
                            <div className="race-status">
                                <span>🏁 <span className="flag">{selectedSession?.country_name} {selectedSession?.session_name}</span></span>
                                <span>Vuelta {currentSnapshot.lap} / {totalSnapshots}</span>
                                <span>⏱ {mode === 'offline' ? (isPlaying ? '▶ Reproduciendo' : '⏸ Pausado') : '📡 En directo'}</span>
                            </div>

                            {mode === 'offline' && (
                                <div className="playback-controls">
                                    <button onClick={prevSnapshot}>⏮</button>
                                    <button onClick={playPause}>{isPlaying ? '⏸' : '▶️'}</button>
                                    <button onClick={stop}>⏹</button>
                                    <button onClick={nextSnapshot}>⏭</button>
                                    <span className="lap-info">Snapshot {snapshotIndex + 1} / {totalSnapshots}</span>
                                    <div style={{ display: 'flex', gap: '4px', marginLeft: '12px' }}>
                                        {[0.5, 1, 2, 4].map(s => (
                                            <button key={s} className={`speed-btn ${speed === s ? 'active' : ''}`} onClick={() => setSpeed(s)}>{s}×</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="map-controls">
                                <button className={showMap ? 'active' : ''} onClick={() => setShowMap(!showMap)}>
                                    {showMap ? '🗺️ Ocultar mapa' : '🗺️ Mostrar mapa'}
                                </button>
                                {Object.keys(carPositions).length > 0 && <span style={{ color: '#aaa', fontSize: '0.8rem' }}>{Object.keys(carPositions).length} coches</span>}
                            </div>
                            {showMap && compactData.trackPoints && compactData.trackPoints.length > 0 && (
                                <div className="map-container">
                                    <TrackMap
                                        trackPoints={compactData.trackPoints}
                                        carPositions={carPositions}
                                        driverMap={compactData.drivers}
                                    />
                                    <div className="map-legend">
                                        <span style={{ color: '#aaa', fontSize: '0.7rem' }}>🟦 Trazado</span>
                                        {Object.entries(compactData.drivers).slice(0, 5).map(([num, info]) => (
                                            <span key={num} className="item">
                                                <span className="dot" style={{ background: info.c }}></span>
                                                {info.a}
                                            </span>
                                        ))}
                                        {Object.keys(compactData.drivers).length > 5 && <span>+{Object.keys(compactData.drivers).length - 5}</span>}
                                    </div>
                                </div>
                            )}

                            <div className="table-wrapper">
                                <table>
                                    <thead><tr><th>#</th><th>Piloto</th><th>Intervalo</th><th>Gap líder</th></tr></thead>
                                    <tbody>
                                        {drivers.map((d, idx) => {
                                            const info = compactData.drivers[d.n] || { a: `#${d.n}`, c: '#888' };
                                            return (
                                                <tr key={d.n || idx} className={d.p > 10 ? 'inactive' : ''}>
                                                    <td className="pos">{d.p}</td>
                                                    <td><div className="driver-name"><span className="driver-color" style={{ background: info.c }}></span><span className="driver-acronym">{info.a}</span></div></td>
                                                    <td><div className="gap-to-leader">{d.g !== null && d.g !== undefined ? `${d.g}s` : '--'}</div><div className="interval" style={{ fontSize: '0.7rem', color: '#777' }}>{d.i !== null && d.i !== undefined ? `(± ${d.i}s)` : ''}</div></td>
                                                    <td>{d.g !== null && d.g !== undefined ? `${d.g}s` : '--'}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // ================================================================
        // 7. COMPONENTE MAPA
        // ================================================================
        function TrackMap({ trackPoints, carPositions, driverMap }) {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const rect = canvas.parentElement.getBoundingClientRect();
                const width = rect.width || 600;
                const height = Math.min(width * 0.6, 400);
                canvas.width = width * 2;
                canvas.height = height * 2;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.scale(2, 2);
                ctx.clearRect(0, 0, width, height);

                if (!trackPoints || trackPoints.length < 3) {
                    ctx.fillStyle = '#666';
                    ctx.font = '16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Datos de ubicación no disponibles', width/2, height/2);
                    return;
                }

                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                trackPoints.forEach(p => {
                    if (p.x < minX) minX = p.x;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.y > maxY) maxY = p.y;
                });
                const padding = 20;
                const scale = Math.min((width - padding * 2) / (maxX - minX || 1), (height - padding * 2) / (maxY - minY || 1));
                const offsetX = (width - (maxX - minX) * scale) / 2 - minX * scale;
                const offsetY = (height - (maxY - minY) * scale) / 2 - minY * scale;
                const transform = (x, y) => ({ cx: x * scale + offsetX, cy: y * scale + offsetY });

                ctx.beginPath();
                ctx.strokeStyle = '#2a5a7a';
                ctx.lineWidth = 2.5;
                trackPoints.forEach((p, i) => {
                    const { cx, cy } = transform(p.x, p.y);
                    if (i === 0) ctx.moveTo(cx, cy);
                    else ctx.lineTo(cx, cy);
                });
                ctx.stroke();

                if (carPositions) {
                    Object.entries(carPositions).forEach(([num, pos]) => {
                        if (!pos) return;
                        const { cx, cy } = transform(pos.x, pos.y);
                        const color = driverMap[num]?.c || '#fff';
                        ctx.beginPath();
                        ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
                        ctx.fillStyle = color;
                        ctx.fill();
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 8px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText(num, cx, cy - 8);
                    });
                }
            }, [trackPoints, carPositions, driverMap]);
            return <canvas ref={canvasRef} style={{ width: '100%', height: 'auto' }} />;
        }

        // ================================================================
        // 8. RENDER
        // ================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
