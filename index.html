<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audiolibros Pro - Dark Mode</title>
    <style>
        /* Estilos generales y fondo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }

        /* Contenedor principal */
        .player-container {
            background-color: #1a1a1a;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .book-info h2 { 
            margin: 10px 0 5px; 
            color: #ffffff; 
            font-weight: 600; 
            font-size: 1.4rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-info p { color: #a0a0a0; margin-bottom: 30px; }

        /* Sección de carga de archivo */
        .upload-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 2px dashed #4a90e2;
            border-radius: 12px;
            transition: border-color 0.3s;
        }
        
        #file-input { display: none; }

        .custom-file-upload {
            color: #4a90e2;
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
        }

        /* Barra de progreso personalizada */
        .progress-container { width: 100%; margin-bottom: 25px; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4a90e2;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.4);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
        }

        /* Controles de reproducción */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            background: none;
            border: 2px solid #1e5bb8;
            color: #4a90e2;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover { background-color: rgba(74, 144, 226, 0.1); }

        .play-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ajustes (Velocidad y Temporizador) */
        .beep-marker {
            position: absolute;
            width: 2px;
            height: 8px;
            background-color: #ffffff;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }

        select { 
            background-color: #333; 
            color: white; 
            border: none;
            border-radius: 8px; 
            padding: 8px; 
            outline: none;
            cursor: pointer;
        }
        
        #timer-msg {
            color: #4a90e2;
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 15px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="upload-section">
        <label for="file-input" class="custom-file-upload" id="drop-zone">
            <b id="file-label">📁 Selecciona tu Audiolibro</b>
        </label>
        <input type="file" id="file-input" accept="audio/*">
    </div>

    <div class="book-info">
        <div id="cover-container" style="margin-bottom: 20px; display: none;">
            <img id="cover-art" src="" alt="Portada" style="width: 200px; height: 200px; object-fit: cover; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #333;">
        </div>
        <h2 id="title">Sin archivo</h2>
        <p id="author">Reproductor Local</p>
    </div>

    <audio id="audio-player"></audio>

    <div class="progress-container" style="position: relative; height: 40px; display: flex; flex-direction: column; justify-content: center;">
        <div id="marker-layer" style="position: absolute; width: 100%; height: 6px; pointer-events: none;"></div>
        <input type="range" id="progress-bar" value="0" step="1" style="position: relative; z-index: 2;">
        <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="skip(-15)">-15s</button>
        <button id="play-pause" class="play-btn" onclick="togglePlay()">▶</button>
        <button onclick="skip(15)">+15s</button>
    </div>    <div class="settings-grid">
        <div class="setting-item">
            <label for="speed">Velocidad:</label>
            <select id="speed" onchange="changeSpeed()">
                <option value="0.5">0.5x</option>
                <option value="0.6">0.6x</option>
                <option value="0.7">0.7x</option>
                <option value="0.8">0.8x</option>
                <option value="0.9">0.9x</option>
                <option value="1" selected>1.0x (Normal)</option>
                <option value="1.1">1.1x</option>
                <option value="1.2">1.2x</option>
                <option value="1.3">1.3x</option>
                <option value="1.4">1.4x</option>
                <option value="1.5">1.5x</option>
                <option value="1.75">1.75x</option>
                <option value="2">2.0x</option>
                <option value="2.5">2.5x</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="sleep-timer">Apagar en:</label>
            <select id="sleep-timer" onchange="setTimer()">
                <option value="0" selected>Desactivado</option>
                <option value="15">15 minutos</option>
                <option value="30">30 minutos</option>
                <option value="60">1 hora</option>
            </select>
        </div>
        <div class="setting-item" style="grid-column: span 2; display: flex; flex-direction: column; gap: 8px; background: #252525; padding: 15px; border-radius: 12px; margin-top: 5px; border: 1px solid #333;">
            <div style="display: flex; align-items: center; justify-content: center;">
                <input type="checkbox" id="normalize-vol" onchange="toggleNormalization()" style="width: 20px; height: 20px; cursor: pointer; margin-right: 12px;">
                <label for="normalize-vol" style="cursor: pointer; color: #4a90e2; font-weight: bold; font-size: 0.9rem;">🔊 Modo Noche (Audio Plano)</label>
            </div>
            <div style="display: flex; align-items: center; justify-content: center; border-top: 1px solid #333; margin-top: 5px; padding-top: 10px; gap: 10px;">
                <input type="checkbox" id="silence-beep" onchange="toggleSilenceDetection()" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="silence-beep" style="cursor: pointer; color: #06d6a0; font-size: 0.85rem; font-weight: 500;">🔔 Bip en Silencio cada:</label>
                <select id="beep-interval" style="padding: 2px 5px; font-size: 0.8rem; background: #333; color: white; border: none; border-radius: 4px;">
                    <option value="300" selected>5 min</option>
                    <option value="600">10 min</option>
                    <option value="900">15 min</option>
                    <option value="1200">20 min</option>
                    <option value="1800">30 min</option>
                </select>
            </div>
        </div>
    </div>
    <div id="timer-msg"></div>
</div>

<script>
    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const speedSelect = document.getElementById('speed');
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');
    const titleEl = document.getElementById('title');
    const timerSelect = document.getElementById('sleep-timer');
    const timerMsg = document.getElementById('timer-msg');

    let sleepTimerTimeout; // Variable para guardar la referencia del temporizador
    let currentFileName = ""; // Para guardar el nombre del archivo y usarlo como llave de guardado

    // 1. Carga del archivo y recuperación de progreso
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            currentFileName = file.name;
            fileLabel.textContent = "Archivo cargado ✓";
            
            // Reset de imagen y textos
            document.getElementById('cover-container').style.display = 'none';
            titleEl.textContent = currentFileName.replace(/\.[^/.]+$/, "");
            document.getElementById('author').textContent = "Cargando...";

            // Intento de lectura de Metadatos con JS Media Tags
            try {
                window.jsmediatags.read(file, {
                    onSuccess: function(tag) {
                        const { title, artist, picture } = tag.tags;
                        if (title) titleEl.textContent = title;
                        if (artist) document.getElementById('author').textContent = artist;
                        else document.getElementById('author').textContent = "Autor Desconocido";

                        if (picture) {
                            const { data, format } = picture;
                            let base64String = "";
                            for (let i = 0; i < data.length; i++) {
                                base64String += String.fromCharCode(data[i]);
                            }
                            const base64 = "data:" + format + ";base64," + window.btoa(base64String);
                            const img = document.getElementById('cover-art');
                            img.src = base64;
                            document.getElementById('cover-container').style.display = 'block';
                        }
                    },
                    onError: function(error) {
                        console.log('Error de tags:', error);
                        document.getElementById('author').textContent = "Reproductor Local";
                    }
                });
            } catch (e) { console.error("Librería no cargada"); }
            
            const objectURL = URL.createObjectURL(file);
            audio.src = objectURL;
            playPauseBtn.textContent = '▶';
            audio.load(); 

            // Recuperar el progreso guardado usando el nombre del archivo como identificador
            const savedTime = localStorage.getItem('audiobook_progress_' + currentFileName);
            if(savedTime) {
                // Si existe un tiempo guardado, adelantamos el audio a ese punto
                audio.currentTime = parseFloat(savedTime);
                timerMsg.textContent = "Progreso recuperado.";
                setTimeout(() => timerMsg.textContent = "", 3000);
            }
        }
    });

    audio.onloadedmetadata = () => {
        progressBar.max = Math.floor(audio.duration);
        durationEl.textContent = formatTime(audio.duration);
    };

    function togglePlay() {
        if (!audio.src) {
            alert("Por favor, selecciona primero un archivo de audio.");
            return;
        }
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '⏸';
        } else {
            audio.pause();
            playPauseBtn.textContent = '▶';
            // Guardar progreso al pausar manualmente
            saveProgress();
        }
    }

    // 2. Guardado automático de progreso mientras avanza
    audio.ontimeupdate = () => {
        progressBar.value = Math.floor(audio.currentTime);
        currentTimeEl.textContent = formatTime(audio.currentTime);
        
        // Guardamos el progreso cada vez que el tiempo se actualiza
        if(currentFileName && !audio.paused) {
            saveProgress();
        }
    };

    // Función para guardar en el navegador (localStorage)
    function saveProgress() {
        localStorage.setItem('audiobook_progress_' + currentFileName, audio.currentTime);
    }

    progressBar.oninput = () => {
        audio.currentTime = progressBar.value;
    };

    function skip(seconds) {
        audio.currentTime += seconds;
    }

    function changeSpeed() {
        audio.playbackRate = speedSelect.value;
    }

    // 3. Lógica del temporizador de apagado
    function setTimer() {
        // Limpiamos cualquier temporizador anterior
        clearTimeout(sleepTimerTimeout);
        const minutes = parseInt(timerSelect.value);

        if (minutes > 0) {
            const milliseconds = minutes * 60 * 1000;
            timerMsg.textContent = `El audio se pausará en ${minutes} minutos.`;
            
            sleepTimerTimeout = setTimeout(() => {
                audio.pause();
                playPauseBtn.textContent = '▶';
                timerMsg.textContent = "Temporizador finalizado. Audio pausado.";
                timerSelect.value = "0"; // Reiniciamos el selector
                saveProgress(); // Nos aseguramos de guardar donde se paró
            }, milliseconds);
        } else {
            timerMsg.textContent = "Temporizador desactivado.";
            setTimeout(() => timerMsg.textContent = "", 3000);
        }
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }    audio.onerror = () => {
        if (audio.src) {
            alert("Error: No se pudo reproducir este archivo.");
        }
    };    // Lógica para Audio Plano (Compresión Dinámica) y Detector de Silencio
    let audioCtx, source, compressor, analyser, dataArray;
    let lastBeepTime = 0;
    let silenceInterval;

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            
            // Configuración Compresor
            compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-45, audioCtx.currentTime);
            compressor.knee.setValueAtTime(30, audioCtx.currentTime);
            compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
            compressor.release.setValueAtTime(0.25, audioCtx.currentTime);

            // Analizador para silencio
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            // Conexión inicial estándar
            source.connect(audioCtx.destination);
        }
    }

    function toggleNormalization() {
        if (!audio.src) { document.getElementById('normalize-vol').checked = false; alert("Carga un audio primero."); return; }
        initAudioContext();

        const isChecked = document.getElementById('normalize-vol').checked;
        source.disconnect();

        if (isChecked) {
            source.connect(compressor);
            compressor.connect(audioCtx.destination);
            timerMsg.textContent = "Modo Noche activado.";
        } else {
            source.connect(audioCtx.destination);
            timerMsg.textContent = "Audio normal.";
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        setTimeout(() => timerMsg.textContent = "", 3000);
    }

    function toggleSilenceDetection() {
        if (!audio.src) { document.getElementById('silence-beep').checked = false; alert("Carga un audio primero."); return; }
        initAudioContext();
        
        const isEnabled = document.getElementById('silence-beep').checked;
        if (isEnabled) {
            source.connect(analyser);
            silenceInterval = setInterval(checkSilence, 1000);
            timerMsg.textContent = "Detector de silencio activo.";
        } else {
            clearInterval(silenceInterval);
            timerMsg.textContent = "Detector desactivado.";
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        setTimeout(() => timerMsg.textContent = "", 3000);
    }

    function checkSilence() {
        if (audio.paused) return;

        analyser.getByteFrequencyData(dataArray);
        let average = dataArray.reduce((a, b) => a + b) / dataArray.length;
        
        const currentTime = audio.currentTime;
        const interval = parseInt(document.getElementById('beep-interval').value);

        // Si hay silencio (volumen bajo) y ha pasado el tiempo necesario
        if (average < 5 && (currentTime - lastBeepTime) >= interval) {
            playBeep();
            addMarker(currentTime);
            lastBeepTime = currentTime;
        }
    }

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime); // Nota La

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
    }

    function addMarker(time) {
        const markerLayer = document.getElementById('marker-layer');
        const percent = (time / audio.duration) * 100;
        const marker = document.createElement('div');
        marker.className = 'beep-marker';
        marker.style.left = `calc(${percent}% - 1px)`;
        markerLayer.appendChild(marker);
    }
</script>

</body>
</html>
